services:
  mysql:
    image: mysql:8.4
    container_name: job_ai_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_ai_agent
      MYSQL_USER: job_user
      MYSQL_PASSWORD: job_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: